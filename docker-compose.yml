version: '3.8'

services:
  # -----------------------------------------
  # Microservicios
  # -----------------------------------------
  ms-agendahub:
    build:
      context: ./MS-AgendaHub
      dockerfile: Dockerfile
    container_name: ms-agendahub
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver-medipass;Database=MS-AgendaHub;User Id=sa;Password=Medipass_Password123!;TrustServerCertificate=True
      - Services__InsuranceService=http://ms-insurance:5002
      - Services__EhrService=http://ms-ehrlogger:5003
      - RabbitMQ__Host=rabbitmq-medipass
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=medipass
      - RabbitMQ__Password=medipass_pass
    depends_on:
      - sqlserver-medipass
      - rabbitmq-medipass

  ms-insurance:
    build:
      context: ./MS-Insurance
      dockerfile: Dockerfile
    container_name: ms-insurance
    ports:
      - "5002:5002"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver-medipass;Database=MS-Insurance;User Id=sa;Password=Medipass_Password123!;TrustServerCertificate=True
    depends_on:
      - sqlserver-medipass

  # Preparado para el logger
  ms-ehrlogger:
    build:
      context: ./MS_EHRLOGGER
      dockerfile: Dockerfile 
    container_name: ms-ehrlogger
    ports:
      - "5003:5003" 
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - MongoDB__ConnectionString=mongodb://ehrlogger_user:ehrlogger_pass@mongodb-medipass:27017/ehr_db?authSource=admin
      - RabbitMQ__Host=rabbitmq-medipass
      - Jaeger__Host=jaeger-medipass
    depends_on:
      - mongodb-medipass
      - rabbitmq-medipass
      - jaeger-medipass

  # -----------------------------------------
  # Infraestructura (Bases de Datos y Colas)
  # -----------------------------------------
  sqlserver-medipass:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-medipass
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Medipass_Password123!
    volumes:
      - sqlserver_data:/var/opt/mssql

  mongodb-medipass:
    image: mongo:latest
    container_name: mongodb-medipass
    ports:
      - "27019:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=ehrlogger_user
      - MONGO_INITDB_ROOT_PASSWORD=ehrlogger_pass
      - MONGO_INITDB_DATABASE=admin
    volumes:
      - mongodb_data:/data/db

  rabbitmq-medipass:
    image: rabbitmq:3-management
    container_name: rabbitmq-medipass
    ports:
      - "5672:5672"   # Puerto de AMQP
      - "15672:15672" # Interfaz gráfica de administración
    environment:
      - RABBITMQ_DEFAULT_USER=medipass
      - RABBITMQ_DEFAULT_PASS=medipass_pass

  jaeger-medipass:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger-medipass
    ports:
      - "16686:16686"   # Interfaz web de Jaeger
      - "6831:6831/udp" # Agente UDP
      - "14268:14268"   # Recepción de trazas HTTP

volumes:
  sqlserver_data:
  mongodb_data:
